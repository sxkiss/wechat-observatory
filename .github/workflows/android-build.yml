# Android CI for the LSPosed companion module.
# Builds a signed release APK when secrets exist, otherwise falls back to debug, then uploads a flat artifact.
# Main/manual runs also publish the staged APK to a rolling GitHub prerelease.
name: Android Build

on:
  push:
    branches:
      - main
    paths:
      - "android-module/**"
      - ".github/workflows/android-build.yml"
  pull_request:
    paths:
      - "android-module/**"
      - ".github/workflows/android-build.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-module

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform packages
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle caches
        uses: gradle/actions/setup-gradle@v4

      - name: Generate signing keystore from secrets
        id: signing
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -n "${ANDROID_KEYSTORE_PASSWORD}" ] && [ -n "${ANDROID_KEY_ALIAS}" ]; then
            keytool -genkeypair \
              -alias "${ANDROID_KEY_ALIAS}" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=WeChat Observatory" \
              -keystore "$RUNNER_TEMP/release.keystore" \
              -storepass "${ANDROID_KEYSTORE_PASSWORD}" \
              -keypass "${ANDROID_KEYSTORE_PASSWORD}"
            echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build debug or release APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          if [ "${{ steps.signing.outputs.signed }}" = "true" ]; then
            ./gradlew :app:assembleRelease
          else
            ./gradlew :app:assembleDebug
          fi

      - name: Select APK artifact path
        id: artifact
        run: |
          signed_apk="app/build/outputs/apk/release/app-release.apk"
          debug_apk="app/build/outputs/apk/debug/app-debug.apk"
          if [ "${{ steps.signing.outputs.signed }}" = "true" ] && [ -f "$signed_apk" ]; then
            echo "apk_path=$signed_apk" >> "$GITHUB_OUTPUT"
            echo "artifact_name=wechat-observatory-android-release-apk" >> "$GITHUB_OUTPUT"
            echo "target_name=wechat-observatory-android-release.apk" >> "$GITHUB_OUTPUT"
          elif [ -f "$debug_apk" ]; then
            echo "apk_path=$debug_apk" >> "$GITHUB_OUTPUT"
            echo "artifact_name=wechat-observatory-android-debug-apk" >> "$GITHUB_OUTPUT"
            echo "target_name=wechat-observatory-android-debug.apk" >> "$GITHUB_OUTPUT"
          else
            echo "Expected APK was not produced" >&2
            exit 1
          fi

      - name: Stage APK artifact
        run: |
          mkdir -p dist
          cp "${{ steps.artifact.outputs.apk_path }}" "dist/${{ steps.artifact.outputs.target_name }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.artifact_name }}
          path: android-module/dist/${{ steps.artifact.outputs.target_name }}
          if-no-files-found: error

      - name: Publish rolling build release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-build-latest
          name: Android Build Latest
          target_commitish: ${{ github.sha }}
          files: android-module/dist/${{ steps.artifact.outputs.target_name }}
          prerelease: true
          generate_release_notes: false
          append_body: false
          body: |
            Auto-updated by `android-build.yml`.

            - Commit: `${{ github.sha }}`
            - Branch: `${{ github.ref_name }}`
            - APK: `${{ steps.artifact.outputs.target_name }}`
            - Signed: `${{ steps.signing.outputs.signed }}`
