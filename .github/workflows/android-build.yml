# Android CI for the LSPosed companion module.
# Builds a debug APK artifact on main pushes, pull requests, and manual runs.
name: Android Build

on:
  push:
    branches:
      - main
    paths:
      - "android-module/**"
      - ".github/workflows/android-build.yml"
  pull_request:
    paths:
      - "android-module/**"
      - ".github/workflows/android-build.yml"
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-module

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform packages
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wechat-observatory-android-debug-apk
          path: android-module/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
