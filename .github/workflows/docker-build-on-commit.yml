# Docker CI modeled after the allbot workflow.
# Builds and pushes a multi-arch image when main receives container/runtime changes.
name: Docker Multi-arch Build on Commit

on:
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "cmd/**"
      - "internal/**"
      - "web/admin/**"
      - "docs/**"
      - "go.mod"
      - "go.sum"
      - "deploy/docker/**"
      - ".github/workflows/docker-build-on-commit.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:master
          install: true

      - name: Create multi-arch builder
        run: |
          docker buildx create --name multiarch --use
          docker buildx inspect --bootstrap

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute short SHA
        run: echo "GIT_SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          builder: multiarch
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/wechat-observatory:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/wechat-observatory:${{ env.GIT_SHA }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/wechat-observatory:latest
          cache-to: type=inline,mode=max
