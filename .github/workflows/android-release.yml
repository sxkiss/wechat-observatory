# Android release workflow with optional signing secrets.
# Produces signed release APKs when signing is configured, otherwise falls back to debug APKs.
name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to create or update, for example v0.1.3"
        required: true
        type: string

jobs:
  build-release-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-module
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: release_meta
        run: |
          release_tag="${GITHUB_REF_NAME:-}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            release_tag="${{ inputs.release_tag }}"
          fi
          release_tag="$(printf '%s' "$release_tag" | tr -d '[:space:]')"
          if [ -z "$release_tag" ]; then
            echo "release_tag is required" >&2
            exit 1
          fi
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform packages
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle caches
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare signing keystore
        id: signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "${ANDROID_KEYSTORE_BASE64}" ]; then
            echo "${ANDROID_KEYSTORE_BASE64}" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve build target
        id: build_target
        run: |
          if [ "${{ steps.signing.outputs.signed }}" = "true" ]; then
            echo "gradle_task=:app:assembleRelease" >> "$GITHUB_OUTPUT"
            echo "build_variant=release" >> "$GITHUB_OUTPUT"
            echo "artifact_flavor=signed" >> "$GITHUB_OUTPUT"
          else
            echo "gradle_task=:app:assembleDebug" >> "$GITHUB_OUTPUT"
            echo "build_variant=debug" >> "$GITHUB_OUTPUT"
            echo "artifact_flavor=debug" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Android APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew ${{ steps.build_target.outputs.gradle_task }}

      - name: Select APK artifact path
        id: artifact
        run: |
          signed_apk="app/build/outputs/apk/release/app-release.apk"
          debug_apk="app/build/outputs/apk/debug/app-debug.apk"
          if [ "${{ steps.build_target.outputs.build_variant }}" = "release" ] && [ -f "$signed_apk" ]; then
            echo "apk_path=$signed_apk" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.build_target.outputs.build_variant }}" = "debug" ] && [ -f "$debug_apk" ]; then
            echo "apk_path=$debug_apk" >> "$GITHUB_OUTPUT"
          else
            echo "Expected APK was not produced" >&2
            exit 1
          fi

      - name: Normalize release APK name
        id: rename
        run: |
          version_tag="${{ steps.release_meta.outputs.release_tag }}"
          flavor="${{ steps.build_target.outputs.artifact_flavor }}"
          target_name="wechat-observatory-android-${version_tag}-${flavor}.apk"
          target_dir="app/build/outputs/apk/${{ steps.build_target.outputs.build_variant }}"
          cp "${{ steps.artifact.outputs.apk_path }}" "${target_dir}/${target_name}"
          echo "release_apk=${target_dir}/${target_name}" >> "$GITHUB_OUTPUT"

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wechat-observatory-android-apk
          path: android-module/${{ steps.rename.outputs.release_apk }}
          if-no-files-found: error

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          files: android-module/${{ steps.rename.outputs.release_apk }}
          generate_release_notes: true
          append_body: true
          body: |
            ## Android APK

            - Artifact: `${{ steps.rename.outputs.release_apk }}`
            - Build Variant: `${{ steps.build_target.outputs.build_variant }}`
            - Signed: `${{ steps.signing.outputs.signed }}`
