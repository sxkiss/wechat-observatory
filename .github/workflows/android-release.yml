# Android release workflow with optional signing secrets.
# Produces release APK artifacts for version tags and manual runs.
name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-release-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-module
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform packages
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle caches
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare signing keystore
        id: signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "${ANDROID_KEYSTORE_BASE64}" ]; then
            echo "${ANDROID_KEYSTORE_BASE64}" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease

      - name: Select APK artifact path
        id: artifact
        run: |
          signed_apk="app/build/outputs/apk/release/app-release.apk"
          unsigned_apk="app/build/outputs/apk/release/app-release-unsigned.apk"
          if [ -f "$signed_apk" ]; then
            echo "apk_path=$signed_apk" >> "$GITHUB_OUTPUT"
          elif [ -f "$unsigned_apk" ]; then
            echo "apk_path=$unsigned_apk" >> "$GITHUB_OUTPUT"
          else
            echo "No release APK produced" >&2
            exit 1
          fi

      - name: Normalize release APK name
        id: rename
        run: |
          version_tag="${GITHUB_REF_NAME:-manual}"
          if [ "${{ steps.signing.outputs.signed }}" = "true" ]; then
            flavor="signed"
          else
            flavor="unsigned"
          fi
          target_name="wechat-observatory-android-${version_tag}-${flavor}.apk"
          cp "${{ steps.artifact.outputs.apk_path }}" "app/build/outputs/apk/release/${target_name}"
          echo "release_apk=app/build/outputs/apk/release/${target_name}" >> "$GITHUB_OUTPUT"

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wechat-observatory-android-release-apk
          path: android-module/${{ steps.rename.outputs.release_apk }}
          if-no-files-found: error

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android-module/${{ steps.rename.outputs.release_apk }}
          generate_release_notes: true
          append_body: true
          body: |
            ## Android APK

            - Artifact: `${{ steps.rename.outputs.release_apk }}`
            - Signed: `${{ steps.signing.outputs.signed }}`
