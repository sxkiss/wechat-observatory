services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-root-change-me}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-app_wechat_observatory}"
      MYSQL_USER: "${MYSQL_USER:-wechat}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:-change-me}"
      TZ: "${TZ:-Asia/Shanghai}"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  gateway:
    image: sxkiss/wechat-observatory:latest
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    depends_on:
      mysql:
        condition: service_healthy
      gateway-db:
        condition: service_completed_successfully
    environment:
      BRIDGE_HTTP_ADDR: "${BRIDGE_HTTP_ADDR:-:8088}"
      BRIDGE_ADMIN_PASSWORD: "${BRIDGE_ADMIN_PASSWORD:-change-this-password}"
      BRIDGE_DEFAULT_DEVICE: "${BRIDGE_DEFAULT_DEVICE:-phone-a}"
      BRIDGE_DEVICES: "${BRIDGE_DEVICES:-phone-a||wechat-phone|5s}"
      BRIDGE_API_KEYS: "${BRIDGE_API_KEYS:-dev_key_001|phone-a|Test Phone}"
      BRIDGE_MYSQL_DSN: "${MYSQL_USER:-wechat}:${MYSQL_PASSWORD:-change-me}@tcp(${MYSQL_HOST:-mysql}:3306)/${MYSQL_DATABASE:-app_wechat_observatory}?charset=utf8mb4&parseTime=True&loc=Local"
      BRIDGE_MYSQL_AUTO_MIGRATE: "${BRIDGE_MYSQL_AUTO_MIGRATE:-false}"
      BRIDGE_MEDIA_DIR: "${BRIDGE_MEDIA_DIR:-/var/lib/wechat-observatory/media}"
    ports:
      - "${BRIDGE_HTTP_PORT:-8088}:8088"
    volumes:
      - gateway-media:/var/lib/wechat-observatory/media
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8088/healthz"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s

  gateway-db:
    image: sxkiss/wechat-observatory:latest
    restart: "no"
    env_file:
      - path: .env
        required: false
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      BRIDGE_ADMIN_PASSWORD: "${BRIDGE_ADMIN_PASSWORD:-change-this-password}"
      BRIDGE_DEFAULT_DEVICE: "${BRIDGE_DEFAULT_DEVICE:-phone-a}"
      BRIDGE_DEVICES: "${BRIDGE_DEVICES:-phone-a||wechat-phone|5s}"
      BRIDGE_API_KEYS: "${BRIDGE_API_KEYS:-dev_key_001|phone-a|Test Phone}"
      BRIDGE_MYSQL_DSN: "${MYSQL_USER:-wechat}:${MYSQL_PASSWORD:-change-me}@tcp(${MYSQL_HOST:-mysql}:3306)/${MYSQL_DATABASE:-app_wechat_observatory}?charset=utf8mb4&parseTime=True&loc=Local"
    entrypoint: ["/usr/local/bin/wechat-observatory-db"]
    command: ["-create-database", "-migrate", "-seed", "-check"]

volumes:
  mysql-data:
  gateway-media:
